<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <meta
      name="description"
      content="Subsonic Festival - La experiencia musical definitiva"
    />
    <title>Subsonic Festival</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/main.css" />
    <link rel="stylesheet" href="/static/css/componentes.css" />
    <link rel="stylesheet" href="/static/css/home.css" />
    <link rel="stylesheet" href="/static/css/evento.css" />
    <link rel="stylesheet" href="/static/css/carrito.css" />
    <link rel="stylesheet" href="/static/css/perfil.css" />
    <link rel="stylesheet" href="/static/css/historial.css" />
    <link rel="stylesheet" href="/static/css/proveedor.css" />

    <!-- Librerías externas -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>
  <body>
    <!-- Header con navegación -->
    <header class="main-header">
      <nav class="navbar">
        <div class="nav-container">
          <div class="logo-wrapper">
            <a href="#" data-page="home" class="logo-link">
              <div class="logo-icon">🎵</div>
              <div class="logo-text">
                <span class="logo-main">Subsonic</span>
                <span class="logo-sub">Festival</span>
              </div>
            </a>
          </div>
          <div class="nav-menu" id="nav-menu">
            <ul class="nav-links">
              <li>
                <a href="#" data-page="carrito" class="nav-link"
                  ><i class="fas fa-shopping-cart"></i> Carrito
                  <span id="cart-count-badge" class="cart-badge">0</span></a
                >
              </li>
              <li>
                <a href="#" data-page="proveedor" class="nav-link"
                  ><i class="fas fa-store"></i> Proveedores</a
                >
              </li>
            </ul>
          </div>
          <div class="nav-actions">
            <button id="theme-toggle" class="icon-btn">
              <i class="fas fa-moon"></i>
            </button>
            <button id="search-toggle" class="icon-btn">
              <i class="fas fa-search"></i>
            </button>
            <div class="profile-preview">
              <img
                id="nav-profile-image"
                src="https://i.pravatar.cc/100?img=12"
                alt="Perfil"
                class="profile-avatar"
              />
              <div class="profile-dropdown">
                <div class="dropdown-header">
                  <strong id="dropdown-user-name">Usuario</strong>
                  <span id="dropdown-user-email">email@ejemplo.com</span>
                </div>
                <div class="dropdown-divider"></div>
                <a href="#" data-page="perfil"
                  ><i class="fas fa-user-circle"></i> Mi Perfil</a
                >
                <a href="#" data-page="historial"
                  ><i class="fas fa-ticket-alt"></i> Mis Entradas</a
                >
                <div class="dropdown-divider"></div>
                <a href="#" id="logout-btn"
                  ><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a
                >
              </div>
            </div>
            <button id="mobile-menu-toggle" class="mobile-menu-btn icon-btn">
              <i class="fas fa-bars"></i>
            </button>
          </div>
        </div>
      </nav>
      <div id="search-bar" class="search-bar is-hidden">
        <div class="search-container">
          <i class="fas fa-search"></i>
          <input type="text" id="global-search" placeholder="Buscar..." />
          <button id="close-search" class="close-search-btn">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="search-results" class="search-results"></div>
      </div>
    </header>

    <!-- Contenido principal donde se inyectan los partials -->
    <main class="main-content">
      <div id="page-content"></div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
      <div class="footer-content">
        <div class="footer-section">
          <h3>Subsonic Festival</h3>
          <p>La experiencia musical definitiva</p>
        </div>
        <div class="footer-section">
          <h4>Enlaces</h4>
          <ul>
            <li><a href="#" data-page="home">Inicio</a></li>
            <li><a href="#" data-page="carrito">Carrito</a></li>
            <li><a href="#" data-page="proveedor">Proveedores</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Subsonic Festival</p>
      </div>
    </footer>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-container" class="modal-container is-hidden"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="/static/javascript/app.js"></script>
    <script src="/static/javascript/home.js"></script>
    <script src="/static/javascript/evento.js"></script>
    <script src="/static/javascript/carrito.js"></script>
    <script src="/static/javascript/perfil.js"></script>
    <script src="/static/javascript/historial.js"></script>
    <script src="/static/javascript/proveedor.js"></script>
    <script src="/static/javascript/router.js"></script>
  </body>
</html>
