web:
  title: "Subsonic Festival"
  profile_image: "https://i.pravatar.cc/100?img=12"
  description: >
    Plataforma oficial del Subsonic Festival donde los usuarios podrán
    consultar eventos, comprar entradas, descubrir artistas participantes,
    acceder a merchandising y explorar servicios disponibles dentro del
    festival.

