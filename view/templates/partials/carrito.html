<!-- ================================================================
     carrito.html - Página del carrito de compras
     ================================================================
     Esta partial proporciona:
     - Lista de items en el carrito
     - Controles de cantidad (sumar/restar)
     - Botón para eliminar items
     - Cálculo automático de subtotal y total
     - Comisión de gestión
     - Botón de checkout para proceder al pago
     ================================================================ -->

<div id="carrito-content">
  <section class="cart-header page-hero">
    <h1>Tu carrito de compras</h1>
    <p>Revisa tus entradas y procede al pago</p>
  </section>

  <div class="cart-layout">
    <section class="cart-items-section surface-card">
      <div class="cart-items-header">
        <div>Producto</div>
        <div>Precio</div>
        <div>Cantidad</div>
        <div>Subtotal</div>
        <div></div>
      </div>
      <div id="cart-items-list" class="cart-items-list"></div>
      <div id="cart-empty-message" class="cart-empty is-hidden">
        <i class="fas fa-shopping-cart"></i>
        <p>Tu carrito esta vacio</p>
        <button class="btn btn-primary" id="continue-shopping">Seguir comprando</button>
      </div>
    </section>

    <aside class="cart-summary-section">
      <div class="cart-summary-card surface-card">
        <h3>Resumen del pedido</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">0,00 €</span>
        </div>
        <div class="summary-row">
          <span>Gastos de gestion</span>
          <span>2,50 €</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">0,00 €</span>
        </div>
        <button id="checkout-btn" class="btn btn-primary btn-large">Proceder al pago</button>
      </div>
    </aside>
  </div>
</div>
