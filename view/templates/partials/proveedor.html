<div id="proveedor-content">
  <section class="provider-header">
      <h1>Zonas para proveedores</h1>
      <p>Alquila un espacio dentro del festival para ofrecer tus productos o servicios</p>
  </section>

  <div class="provider-stats">
      <div class="stat-card">
          <i class="fas fa-store"></i>
          <span class="stat-number" id="total-zones">0</span>
          <span class="stat-label">Zonas disponibles</span>
      </div>
      <div class="stat-card">
          <i class="fas fa-chart-line"></i>
          <span class="stat-number">+2000</span>
          <span class="stat-label">Visitantes diarios</span>
      </div>
      <div class="stat-card">
          <i class="fas fa-tag"></i>
          <span class="stat-number">Desde 350€</span>
          <span class="stat-label">Precio por zona</span>
      </div>
  </div>

  <div class="zones-grid" id="zones-list"></div>

  <div class="provider-cta">
      <h3>¿Tienes dudas?</h3>
      <p>Contáctanos para más información sobre los espacios disponibles</p>
      <button class="btn btn-outline" id="contact-provider">Contactar</button>
  </div>
</div>
