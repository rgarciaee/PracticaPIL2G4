<div id="evento-content">
  <section class="event-hero no-image">
    <div class="event-hero-media" id="event-hero-media" hidden></div>
    <div class="event-hero-content">
      <div class="event-hero-badge"><i class="fas fa-music"></i> Evento destacado</div>
      <h1 id="event-name" class="event-title">
        <span class="loading-placeholder"></span>
      </h1>
      <div class="event-dates" id="event-dates"></div>
      <div class="event-location" id="event-location"></div>
      <div class="event-description" id="event-description"></div>
    </div>
  </section>

  <section class="event-section">
    <div class="section-header">
      <h2><i class="fas fa-microphone-alt"></i> Artistas participantes</h2>
      <p>Descubre el lineup completo</p>
    </div>
    <div id="artists-list" class="artists-grid"></div>
  </section>

  <section class="event-section">
    <div class="section-header">
      <h2><i class="fas fa-ticket-alt"></i> Entradas disponibles</h2>
      <p>Elige tu experiencia</p>
    </div>
    <div id="tickets-list" class="tickets-grid"></div>
  </section>

  <section class="event-section">
    <div class="section-header">
      <h2><i class="fas fa-clock"></i> Horario del evento</h2>
      <p>No te pierdas ningun concierto</p>
    </div>
    <div id="schedule-list" class="schedule-container"></div>
  </section>

  <section class="event-section">
    <div class="section-header">
      <h2><i class="fas fa-map-marker-alt"></i> Ubicacion</h2>
      <p>Como llegar</p>
    </div>
    <div class="event-map-container">
      <div id="event-map" class="event-map"></div>
    </div>
  </section>

  <section class="event-section">
    <div class="section-header">
      <h2><i class="fas fa-store"></i> Puestos disponibles</h2>
      <p>Comida, bebida y merchandising</p>
    </div>
    <div id="stands-list" class="stands-grid"></div>
  </section>
</div>
