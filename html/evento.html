<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Evento - Subsonic Festival</title>

<link rel="stylesheet" href="../css/home.css">
<link rel="stylesheet" href="../css/evento.css">

</head>

<body>

<header class="topbar">

<div class="logo">Subsonic Festival</div>

<div class="topbar-actions">

<button class="icon-btn">🛒</button>

<div class="profile">
<img id="profile-image" src="">
</div>

</div>

</header>


<main class="event-container">

<section class="event-header">

<h1 id="event-name"></h1>
<p id="event-dates"></p>

</section>


<section class="event-section">

<h2>Artistas participantes</h2>
<div id="artists-list" class="artists-grid"></div>

</section>


<section class="event-section">

<h2>Entradas disponibles</h2>
<div id="tickets-list" class="tickets-grid"></div>

</section>


<section class="event-section">

<h2>Horario</h2>
<div id="schedule-list"></div>

</section>


<section class="event-section">

<h2>Puestos disponibles</h2>
<div id="stands-list" class="stands-grid"></div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script src="../javascript/evento.js"></script>

</body>
</html>
