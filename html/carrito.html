<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Carrito - Subsonic Festival</title>

<link rel="stylesheet" href="../css/home.css">
<link rel="stylesheet" href="../css/carrito.css">

</head>

<body>

<header class="topbar">

<div class="logo">Subsonic Festival</div>

<div class="topbar-actions">

<button id="cart-button" class="icon-btn">🛒</button>

<div class="profile">
<img id="profile-image" src="" alt="perfil">
</div>

</div>

</header>


<!-- desplegable carrito -->

<div id="cart-dropdown" class="cart-dropdown hidden">

<h3>Carrito</h3>

<div id="cart-preview"></div>

<div class="cart-total">
Total: <span id="cart-total-preview"></span> €
</div>

<button class="pay-btn">Pagar</button>

</div>


<main class="container">

<h1>Entradas en tu carrito</h1>

<div id="cart-full-list"></div>

<div class="cart-summary">

<div class="total">
Total compra: <span id="cart-total-page"></span> €
</div>

<button class="pay-btn">Pagar</button>

</div>

</main>


<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script src="../javascript/carrito.js"></script>

</body>
</html>
